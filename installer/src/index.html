<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackstar Installer</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e30;
      --primary: #00b4d8;
      --accent: #7b2ff7;
      --danger: #e94560;
      --success: #00c853;
      --text: #e0e0e0;
      --muted: #6e6e8a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
      position: relative;
    }

    /* ── Snowflakes (installer also has them) ────────────────────────── */
    canvas#snow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .container {
      position: relative; z-index: 1;
      text-align: center; max-width: 400px; width: 90%;
    }

    /* Logo */
    .logo svg { filter: drop-shadow(0 0 16px rgba(123,47,247,.4)); margin-bottom: 16px; }

    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    /* Progress bar */
    .progress-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 28px;
      overflow: hidden;
      margin-bottom: 12px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      border-radius: 8px;
      transition: width .3s ease;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      margin-bottom: 20px;
    }
    .status.error { color: var(--danger); }
    .status.done  { color: var(--success); }

    /* Buttons */
    .btn {
      padding: 12px 36px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
      margin: 4px;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: #fff;
    }
    .btn-success {
      background: rgba(0,200,83,.15);
      color: var(--success);
      border: 1px solid rgba(0,200,83,.3);
    }
    .btn-ghost {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .percent { font-family: Consolas, monospace; font-size: 13px; color: var(--primary); }
  </style>
</head>
<body>
  <canvas id="snow"></canvas>

  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 100 100" width="64" height="64">
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7b2ff7"/>
            <stop offset="100%" stop-color="#00b4d8"/>
          </linearGradient>
        </defs>
        <path d="M50 5 L61 38 L95 38 L68 59 L79 92 L50 72 L21 92 L32 59 L5 38 L39 38 Z" fill="url(#g)"/>
      </svg>
    </div>

    <h1>Blackstar Support Tool</h1>
    <p class="sub">Installer &amp; Updater</p>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <p class="status" id="status"></p>

    <div id="actions">
      <button class="btn btn-primary" id="btn-install">Download &amp; Install</button>
    </div>
  </div>

  <script>
    // ── Snowflakes ──────────────────────────────────────────────────────
    (function() {
      const c = document.getElementById('snow');
      const ctx = c.getContext('2d');
      let W, H;
      const flakes = [];
      function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
      function mk() {
        return { x: Math.random()*W, y: Math.random()*-H, r: Math.random()*3+1,
                 s: Math.random()*.6+.2, d: (Math.random()-.5)*.3, o: Math.random()*.4+.3 };
      }
      resize();
      for (let i = 0; i < 60; i++) { const f = mk(); f.y = Math.random()*H; flakes.push(f); }
      (function draw() {
        ctx.clearRect(0,0,W,H);
        for (const f of flakes) {
          ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
          ctx.fillStyle = `rgba(255,255,255,${f.o})`; ctx.fill();
          f.y += f.s; f.x += f.d;
          if (f.y > H+5 || f.x < -5 || f.x > W+5) { Object.assign(f, mk()); f.y = -5; }
        }
        requestAnimationFrame(draw);
      })();
      addEventListener('resize', resize);
    })();

    // ── Installer logic ─────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    const bar      = $('progress-bar');
    const wrap     = $('progress-wrap');
    const status   = $('status');
    const actions  = $('actions');
    const btnInst  = $('btn-install');

    window.installer.getConfig().then(cfg => {
      if (cfg.installed) {
        status.textContent = 'Blackstar is already installed. Click to update or launch.';
        btnInst.textContent = 'Update';
        actions.innerHTML += ' <button class="btn btn-success" id="btn-launch">Launch</button>';
        $('btn-launch').onclick = () => window.installer.launchApp();
      }
    });

    btnInst.onclick = async () => {
      btnInst.disabled = true;
      wrap.style.display = 'block';
      status.className = 'status';
      status.textContent = 'Starting download…';

      window.installer.onProgress(p => {
        if (p.percent >= 0) {
          bar.style.width = p.percent + '%';
          const mb = (p.downloaded / 1048576).toFixed(1);
          const totalMb = (p.total / 1048576).toFixed(1);
          status.textContent = `Downloading… ${mb} / ${totalMb} MB (${p.percent}%)`;
        } else {
          const mb = (p.downloaded / 1048576).toFixed(1);
          status.textContent = `Downloading… ${mb} MB`;
        }
      });

      window.installer.onStatus(msg => {
        if (msg === 'done') {
          bar.style.width = '100%';
          status.className = 'status done';
          status.textContent = 'Installation complete!';
          actions.innerHTML =
            '<button class="btn btn-success" id="btn-launch2">Launch Blackstar</button>' +
            ' <button class="btn btn-ghost" onclick="window.close()">Close</button>';
          $('btn-launch2').onclick = () => window.installer.launchApp();
        } else if (msg.startsWith('Error')) {
          status.className = 'status error';
          status.textContent = msg;
          btnInst.disabled = false;
          btnInst.textContent = 'Retry';
        } else {
          status.textContent = msg;
        }
      });

      await window.installer.startInstall();
    };
  </script>
</body>
</html>
